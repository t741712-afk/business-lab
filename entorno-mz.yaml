          for($i=0;$i -lt 10;$i++){ try{ Invoke-WebRequest "${ScriptBaseUrl}/db-mssql.ps1" -OutFile $f -UseBasicParsing; break }catch{ Start-Sleep 15 } }
          powershell -ExecutionPolicy Bypass -File $f -AdminPassword "${WindowsAdminPassword}"

  AppDjango:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.small
      ImageId: !Ref AmiUbuntu
      KeyName: !Ref KeyName
      SubnetId: !Ref AppSubnet
      PrivateIpAddress: 10.0.1.14
      SecurityGroupIds: [!Ref InternalSg]
      MetadataOptions: { HttpTokens: required }
      BlockDeviceMappings:
        - { DeviceName: /dev/sda1, Ebs: { VolumeSize: 20, Encrypted: true, VolumeType: gp3 } }
      Tags: [{ Key: Name, Value: app-django }, { Key: Zone, Value: app }]
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          exec > /var/log/bootstrap.log 2>&1
          for i in $(seq 1 10); do curl -fsSL "${ScriptBaseUrl}/app-django.sh" -o /tmp/p.sh && break; sleep 15; done
          chmod +x /tmp/p.sh; bash /tmp/p.sh

  AppPhpFpm:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.small
      ImageId: !Ref AmiAmazonLinux
      KeyName: !Ref KeyName
      SubnetId: !Ref AppSubnet

      SecurityGroupIds: [!Ref InternalSg]
      MetadataOptions: { HttpTokens: required }
      BlockDeviceMappings:
        - { DeviceName: /dev/xvda, Ebs: { VolumeSize: 20, Encrypted: true, VolumeType: gp3 } }
      Tags: [{ Key: Name, Value: app-php-fpm }, { Key: Zone, Value: app }]
      UserData:
        Fn::Base64: !Sub |
